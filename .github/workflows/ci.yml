name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch NIP-44 official test vectors
        run: curl -fsSL https://raw.githubusercontent.com/paulmillr/nip44/main/nip44.vectors.json -o /tmp/nip44-vectors.json

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Conformance — verify test-vectors submodule is initialized
        run: test -f external/nostr-mail-nip/test-vectors/mail-event.json
